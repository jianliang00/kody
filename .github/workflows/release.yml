name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.arch }} DMG
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_PRIVATE_KEY_B64: ${{ secrets.ASC_PRIVATE_KEY_B64 }}
      CSC_NAME: "Developer ID Application: Jianliang Wang (BZP4VMX57B)"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: Validate signing secrets
        env:
          MACOS_CERTIFICATE_B64: ${{ secrets.MACOS_CERTIFICATE_B64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$MACOS_CERTIFICATE_B64"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$ASC_KEY_ID"
          test -n "$ASC_ISSUER_ID"
          test -n "$ASC_PRIVATE_KEY_B64"
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_B64: ${{ secrets.MACOS_CERTIFICATE_B64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/kody-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/kody-signing.keychain-db"
          printf '%s' "$MACOS_CERTIFICATE_B64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$CSC_NAME"
      - name: Configure App Store Connect key
        run: |
          PRIVATE_KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_PRIVATE_KEY_B64" | base64 --decode > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          echo "ASC_PRIVATE_KEY_PATH=$PRIVATE_KEY_PATH" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: |
          brew install asc
          npm ci
      - name: Build signed DMG
        run: |
          cargo build --release -p kody-app-server
          npm run build --workspace @kody/desktop
          npx --workspace @kody/desktop electron-builder --mac dmg --${{ matrix.arch }} --publish never
      - name: Verify, notarize, and staple
        run: |
          APP_PATH="$(find apps/desktop/dist -maxdepth 3 -type d -name 'Kody.app' -print -quit)"
          DMG_PATH="$(find apps/desktop/dist -maxdepth 1 -type f -name 'Kody-*-${{ matrix.arch }}.dmg' -print -quit)"
          test -n "$APP_PATH"
          test -n "$DMG_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          asc notarization submit --file "$DMG_PATH" --wait --poll-interval 15s --timeout 2h --output table
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH"
      - uses: actions/upload-artifact@v4
        with:
          name: kody-macos-${{ matrix.arch }}
          path: apps/desktop/dist/Kody-*-mac-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: kody-macos-*
          path: release
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: gh release create "$TAG" release/*.dmg --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --generate-notes --title "Kody ${TAG#v}"

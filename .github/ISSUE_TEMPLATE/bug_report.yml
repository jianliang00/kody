name: Bug report
description: Report a reproducible problem in Kody
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include API keys, tokens, private code, or conversation content. Security issues belong in a private Security Advisory.
  - type: input
    id: version
    attributes:
      label: Kody version
      placeholder: v0.1.5 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence of steps that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove credentials, private paths, code, and conversation content before pasting logs.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for an existing issue.
          required: true
        - label: This report does not contain secrets or private data.
          required: true
        - label: This is not a vulnerability report.
          required: true
